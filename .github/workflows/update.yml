name: Update hardware feeds

on:
  workflow_dispatch:
    inputs:
      lookback:
        description: '収集対象期間'
        required: true
        default: '1h'
        type: choice
        options:
          - '1h'
          - '3h'
          - '24h'
          - '7days'
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write
  models: read

concurrency:
  group: hardware-feed-update
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Scheduled runs default to 24h: GitHub Actions cron is often delayed or
      # skipped (observed gaps up to ~3.5h), and a 1h lookback permanently drops
      # articles published inside those gaps. seen.json dedup (30 days) keeps a
      # wide lookback from republishing anything.
      LOOKBACK: ${{ inputs.lookback || '24h' }}
      REFRESH_SEEN: ${{ inputs.lookback == '7days' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false
      - run: go test ./...
      - run: go run ./cmd/hw-digest
      - name: Commit generated feeds and deduplication state
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs data/seen.json data/articles.json
          git diff --cached --quiet || git commit -m 'chore: update hardware feeds'
          git push
      # Deployment is handled by Vercel's Git integration: pushing the commit
      # above triggers a Vercel build that serves docs/ behind middleware.js.
