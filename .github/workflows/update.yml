name: Update hardware feeds

on:
  workflow_dispatch:
    inputs:
      lookback:
        description: '収集対象期間'
        required: true
        default: '3h'
        type: choice
        options:
          - '3h'
          - '24h'
          - '7days'
  schedule:
    - cron: '17 */3 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: hardware-feed-update
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      LOOKBACK: ${{ inputs.lookback || '3h' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false
      - run: go test ./...
      - run: go run ./cmd/hw-digest
      - name: Commit generated feeds and deduplication state
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs data/seen.json
          git diff --cached --quiet || git commit -m 'chore: update hardware feeds'
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
