<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>hw-digest</title>
  </head>
  <body>
    <h1>hw-digest</h1>
    <ul>
      <li><a href="akiba/">日本のハードウェア情報</a></li>
      <li><a href="world/">世界のハードウェア情報</a></li>
    </ul>
    <script>
      if (location.search) {
        for (const a of document.querySelectorAll('a[href]')) {
          const h = a.getAttribute('href');
          if (h && !/^[a-z]+:|^\/\//i.test(h) && h.indexOf('?') < 0) {
            a.setAttribute('href', h + location.search);
          }
        }
      }
    </script>
  </body>
</html>
